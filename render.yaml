services:
  - type: web
    name: qhse-manager-pro
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    disk:
      name: qhse-manager-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: CLOUD_MODE
        value: true
      - key: DATA_DIR
        value: /var/data
      - key: SECRET_KEY
        generateValue: true
      - key: TASK_TOKEN
        generateValue: true
